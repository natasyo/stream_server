services:
    # stream_server:
    #   build: .
    #   ports:
    #     - "5433:5433"
    #   env_file:
    #     - .env
    #   depends_on:
    #     - postgres_db

    postgres_db:
        container_name: postgres
        image: postgres:latest
        restart: always
        environment:
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            POSTGRES_DB: ${DATABASE_NAME}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql
        networks:
            - stream_server

    redis:
        container_name: redis
        image: redis:latest
        restart: always
        ports:
            - '6379:6379'
        command: redis-server --requirepass ${REDIS_PASSWORD}
        volumes:
            - redis_data:/data
        networks:
            - stream_server


    mailpit:
        image: axllent/mailpit
        container_name: mailpit
        restart: unless-stopped
        volumes:
            - ./data:/data
        ports:
            - 8025:8025
            - 1025:1025
        environment:
            MP_MAX_MESSAGES: 5000
            MP_DATABASE: /data/mailpit.db
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
            MP_SMTP_AUTH_USERNAME: "test"
            MP_SMTP_AUTH_PASSWORD: "1234"

    minio:
        image: quay.io/minio/minio
        container_name: local_minio
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        volumes:
            - minio_data:/data
        command: server /data --console-address ":9001"

    create_buckets:
        image: quay.io/minio/mc
        depends_on:
            - minio
        entrypoint: >
            /bin/sh -c "
            until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
            /usr/bin/mc mb --ignore-existing myminio/twich;
            exit 0;
            "

volumes:
    postgres_data:
    redis_data:
    mailpit:
    minio_data:

networks:
    stream_server:
