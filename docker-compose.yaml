version: '3.7'

services:
    # stream_server:
    #   build: .
    #   ports:
    #     - "5433:5433"
    #   env_file:
    #     - .env
    #   depends_on:
    #     - postgres_db

    postgres_db:
        container_name: postgres
        image: postgres:latest
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - stream_server

    redis:
        container_name: redis
        image: redis:latest
        restart: always
        ports:
            - '6379:6379'
        command: redis-server --requirepass ${REDIS_PASSWORD}
        volumes:
            - redis_data:/data
        networks:
            - stream_server


    mailpit:
        image: axllent/mailpit
        container_name: mailpit
        restart: unless-stopped
        volumes:
            - ./data:/data
        ports:
            - 8025:8025
            - 1025:1025
        environment:
            MP_MAX_MESSAGES: 5000
            MP_DATABASE: /data/mailpit.db
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
            MP_SMTP_AUTH_USERNAME: "test"
            MP_SMTP_AUTH_PASSWORD: "1234"

volumes:
    postgres_data:
    redis_data:
    mailpit:
networks:
    stream_server:
